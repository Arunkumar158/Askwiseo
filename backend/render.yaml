services:
  - type: web
    name: askwiseo-backend
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install "numpy==1.26.4" && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
